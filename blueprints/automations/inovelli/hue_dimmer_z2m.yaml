blueprint:
  name: Hue Paddle Dimming + Scene Cycling (Z2M)
  description: |-
    All-in-one automation for Inovelli Blue switches (Zigbee2MQTT) and Hue rooms/zones.

    ✅ No input_boolean helpers required
    ✅ No separate script blueprint required
    ✅ Tap up/down → On/Off
    ✅ Double tap up/down → 100% / 10% brightness
    ✅ Hold up/down → Smooth inline dimming (no external script needed)
    ✅ Config button → Cycle Hue scenes forward/backward
    ✅ LED color/intensity reflects light state
    ✅ Bidirectional sync: Hue room ↔ Inovelli switch LED
    ✅ Optional: activate a default scene when turning on
    ✅ Optional: scene cycling (requires one input_number helper)

    Requires one custom MQTT sensor per switch (expire_after: 1) for reliable action detection.
    See the README for the sensor configuration snippet.

    Scene cycling is optional and requires one input_number helper (min: 0, max: 99, step: 1).
    Leave the Scene Index Helper unselected to disable scene cycling entirely.

  domain: automation

  input:
    z2m_action_sensor:
      name: Z2M Action Sensor
      description: >
        The MQTT sensor that reports your switch's button actions.
        Recommended: create a custom MQTT sensor in your configuration.yaml with expire_after: 1.
        This is required for repeated presses of the same action (e.g., config_single twice)
        to register correctly. See README for the sensor configuration snippet.
        The sensor is typically named sensor.<device_name>_action (e.g., sensor.kitchen_switch_action).
        Alternatively the Z2M HA integration may auto-create this sensor, but without expire_after
        repeated same-action presses will not re-trigger the automation.
      selector:
        entity:
          domain: sensor
          integration: mqtt

    switch_entity:
      name: Inovelli Switch Light Entity
      description: The light entity of the Inovelli switch (controls the LED bar on/off state).
      selector:
        entity:
          domain: light
          integration: mqtt

    light_entity:
      name: Hue Light Group
      description: The Hue room or zone light group to control.
      selector:
        entity:
          domain: light
          integration: hue

    z2m_device_name:
      name: Z2M Device Name
      description: >
        The friendly name of your switch in Zigbee2MQTT — used to set LED colors via MQTT.
        Find it in the Zigbee2MQTT dashboard (the name shown in the device list).
        ⚠️ Case-sensitive — must match exactly (e.g., kitchen_switch not Kitchen_Switch).
        Tip: it is usually the same as your switch light entity name without the domain
        (e.g., if your entity is light.kitchen_switch, try kitchen_switch).
      selector:
        text:

    brightness_step:
      name: Dimming Speed (%)
      description: Brightness change per tick while holding the paddle. Lower = slower dimming.
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
          unit_of_measurement: "%"

    switch_led_off_color:
      name: LED Color When Off
      description: Inovelli LED color value (0–255) shown when the light is off. 24 = warm white.
      default: 24
      selector:
        number:
          min: 0
          max: 255
          step: 1

    scene_index_helper:
      name: Scene Index Helper (Optional — enables scene cycling)
      description: >
        To enable scene cycling with the config button, first create an input_number helper
        (Settings → Helpers → Add → Number, min: 0, max: 99, step: 1), then select it here.
        Leave unselected to disable scene cycling entirely.
        Scenes are discovered automatically by matching scene.<room>_* where room is derived
        from your Hue light group entity name (e.g., light.bedroom → scene.bedroom_*).
      default: ""
      selector:
        entity:
          domain: input_number

    default_scene_enabled:
      name: Activate Default Scene on Turn On
      default: false
      selector:
        boolean:

    default_scene:
      name: Default Scene
      description: >
        Scene to activate when the light group turns on (only used if enabled above).
        Only Hue scenes are shown. Hue scenes follow the pattern scene.<room>_<name>
        (e.g., scene.bedroom_relax). Pick one that matches your Hue light group.
        Note: HA blueprint selectors cannot dynamically filter scenes to only the selected room —
        all Hue scenes are shown, so choose carefully.
      default: ""
      selector:
        entity:
          domain: scene
          integration: hue

trigger:
  # Z2M button/paddle actions from the action sensor.
  # not_from is intentionally omitted: sensors with expire_after: 1 transition FROM
  # unavailable each press, and that transition must be allowed to fire the trigger.
  - platform: state
    entity_id: !input z2m_action_sensor
    to:
      - up_single
      - down_single
      - up_held
      - down_held
      - up_release
      - down_release
      - up_double
      - down_double
      - config_single
      - config_held
    id: z2m_action

  # Light state changes — used for bidirectional sync
  - platform: state
    entity_id: !input light_entity
    from: "off"
    to: "on"
    id: light_on

  - platform: state
    entity_id: !input light_entity
    from: "on"
    to: "off"
    id: light_off

  # Switch entity state changes — used for bidirectional sync
  - platform: state
    entity_id: !input switch_entity
    from: "off"
    to: "on"
    id: switch_on

  - platform: state
    entity_id: !input switch_entity
    from: "on"
    to: "off"
    id: switch_off

condition:
  # For Z2M actions: only proceed if the action is fresh (< 30s).
  # This prevents stale actions from re-triggering after a HA restart.
  - condition: or
    conditions:
      - condition: template
        value_template: "{{ trigger.id != 'z2m_action' }}"
      - condition: template
        value_template: "{{ (now() - trigger.to_state.last_changed).total_seconds() < 30 }}"

variables:
  light_entity: !input light_entity
  switch_entity: !input switch_entity
  z2m_device_name: !input z2m_device_name
  switch_led_off_color: !input switch_led_off_color
  brightness_step: !input brightness_step
  scene_index_helper: !input scene_index_helper
  default_scene_enabled: !input default_scene_enabled
  default_scene: !input default_scene
  # Derive room name from the light entity for scene discovery (e.g. light.bedroom → bedroom)
  room_lower: "{{ light_entity.split('.')[1] | lower }}"
  available_scenes: >
    {% set prefix = 'scene.' ~ room_lower ~ '_' %}
    {{ states.scene | map(attribute='entity_id') | select('search', prefix) | list | sort }}
  # Current action (empty string for non-button triggers)
  action: "{{ trigger.to_state.state if trigger.id == 'z2m_action' else '' }}"
  # Dimming direction and signed step (+/- brightness_step).
  # Single-line template avoids YAML block scalar whitespace artifacts.
  direction: "{% if action == 'down_held' %}Down{% elif action == 'up_held' %}Up{% else %}unknown{% endif %}"
  brightness_step_signed: "{{ brightness_step | int * (1 if direction == 'Up' else -1) }}"

action:
  - choose:

      # -------------------------------------------------------------------------
      # TAP UP: Turn on the Hue light and switch.
      # The light_on trigger handles LED update, default scene, and switch sync.
      # Explicit switch turn-on here covers the case where the light was already on.
      # -------------------------------------------------------------------------
      - conditions: "{{ action == 'up_single' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light_entity }}"
          - service: light.turn_on
            target:
              entity_id: "{{ switch_entity }}"

      # -------------------------------------------------------------------------
      # TAP DOWN: Turn off the Hue light and switch, update LED to off state.
      # LED is set before switch to ensure it runs even if mode:restart
      # interrupts the sequence (the light_off handler also covers this).
      # -------------------------------------------------------------------------
      - conditions: "{{ action == 'down_single' }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: "{{ light_entity }}"
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ z2m_device_name }}/set"
              payload: >
                {
                  "ledColorWhenOff": {{ switch_led_off_color }},
                  "ledIntensityWhenOff": 1
                }
          - service: light.turn_off
            target:
              entity_id: "{{ switch_entity }}"

      # -------------------------------------------------------------------------
      # DOUBLE TAP UP: Set brightness to 100%.
      # LED intensity is hardcoded to 100 for immediate feedback.
      # -------------------------------------------------------------------------
      - conditions: "{{ action == 'up_double' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light_entity }}"
            data:
              brightness_pct: 100
          - service: light.turn_on
            target:
              entity_id: "{{ switch_entity }}"
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ z2m_device_name }}/set"
              payload: '{"ledIntensityWhenOn": 100}'

      # -------------------------------------------------------------------------
      # DOUBLE TAP DOWN: Set brightness to 10%.
      # LED intensity is hardcoded to 10 for immediate feedback.
      # -------------------------------------------------------------------------
      - conditions: "{{ action == 'down_double' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light_entity }}"
            data:
              brightness_pct: 10
          - service: light.turn_on
            target:
              entity_id: "{{ switch_entity }}"
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ z2m_device_name }}/set"
              payload: '{"ledIntensityWhenOn": 10}'

      # -------------------------------------------------------------------------
      # HOLD (UP or DOWN): Inline dimming loop.
      # Runs until mode:restart kills it when the release event fires.
      # LED intensity is updated each step to reflect current brightness.
      # -------------------------------------------------------------------------
      - conditions: "{{ action in ['up_held', 'down_held'] }}"
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: "{{ light_entity }}"
                  data:
                    brightness_step_pct: "{{ brightness_step_signed }}"
                - delay:
                    milliseconds: 400
                - variables:
                    current_brightness: >
                      {{ ((states[light_entity].attributes.brightness | default(255) | float / 255) * 100) | int }}
                - service: mqtt.publish
                  data:
                    topic: "zigbee2mqtt/{{ z2m_device_name }}/set"
                    payload: '{"ledIntensityWhenOn": {{ current_brightness }}}'
              until:
                # Loop runs forever — mode:restart terminates it when release fires
                - condition: template
                  value_template: "false"

      # -------------------------------------------------------------------------
      # CONFIG PRESS: Cycle scenes forward.
      # After activation, waits for the light to settle then updates LED.
      # -------------------------------------------------------------------------
      - conditions: "{{ action == 'config_single' and scene_index_helper != '' and available_scenes | length > 0 }}"
        sequence:
          - variables:
              current: "{{ states(scene_index_helper) | int(0) }}"
              next: "{{ (current + 1) % (available_scenes | length) }}"
              next_scene: "{{ available_scenes[next] }}"
          - service: input_number.set_value
            data:
              entity_id: "{{ scene_index_helper }}"
              value: "{{ next }}"
          - service: scene.turn_on
            target:
              entity_id: "{{ next_scene }}"
          - delay:
              milliseconds: 500
          - variables:
              scene_color: >
                {% set s = states[light_entity] %}
                {% if s.attributes.hs_color is defined %}
                  {{ (s.attributes.hs_color[0] / 360 * 255) | int }}
                {% else %}
                  24
                {% endif %}
              scene_intensity: >
                {{ ((states[light_entity].attributes.brightness | default(255) | float / 255) * 100) | int }}
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ z2m_device_name }}/set"
              payload: >
                {
                  "ledColorWhenOn": {{ scene_color }},
                  "ledIntensityWhenOn": {{ scene_intensity }}
                }

      # -------------------------------------------------------------------------
      # CONFIG HOLD: Cycle scenes backward.
      # -------------------------------------------------------------------------
      - conditions: "{{ action == 'config_held' and scene_index_helper != '' and available_scenes | length > 0 }}"
        sequence:
          - variables:
              current: "{{ states(scene_index_helper) | int(0) }}"
              prev: "{{ (current - 1) % (available_scenes | length) }}"
              prev_scene: "{{ available_scenes[prev] }}"
          - service: input_number.set_value
            data:
              entity_id: "{{ scene_index_helper }}"
              value: "{{ prev }}"
          - service: scene.turn_on
            target:
              entity_id: "{{ prev_scene }}"
          - delay:
              milliseconds: 500
          - variables:
              scene_color: >
                {% set s = states[light_entity] %}
                {% if s.attributes.hs_color is defined %}
                  {{ (s.attributes.hs_color[0] / 360 * 255) | int }}
                {% else %}
                  24
                {% endif %}
              scene_intensity: >
                {{ ((states[light_entity].attributes.brightness | default(255) | float / 255) * 100) | int }}
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ z2m_device_name }}/set"
              payload: >
                {
                  "ledColorWhenOn": {{ scene_color }},
                  "ledIntensityWhenOn": {{ scene_intensity }}
                }

      # -------------------------------------------------------------------------
      # LIGHT TURNED ON (Hue app, HA, or another automation):
      # Sync the switch, update LED to match the light's color and brightness,
      # and optionally activate a default scene.
      #
      # Important: LED update and default scene run BEFORE the switch is turned on.
      # This prevents a cascade restart from the switch_on trigger from skipping them.
      # -------------------------------------------------------------------------
      - conditions: "{{ trigger.id == 'light_on' }}"
        sequence:
          # Wait briefly for Hue to report its settled color/brightness
          - delay:
              milliseconds: 300
          - variables:
              room_color: >
                {% set s = states[light_entity] %}
                {% if s.attributes.hs_color is defined %}
                  {{ (s.attributes.hs_color[0] / 360 * 255) | int }}
                {% else %}
                  24
                {% endif %}
              led_intensity: >
                {{ ((states[light_entity].attributes.brightness | default(255) | float / 255) * 100) | int }}
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ z2m_device_name }}/set"
              payload: >
                {
                  "ledColorWhenOn": {{ room_color }},
                  "ledIntensityWhenOn": {{ led_intensity }}
                }
          - choose:
              - conditions: "{{ default_scene_enabled and default_scene != '' }}"
                sequence:
                  - service: scene.turn_on
                    target:
                      entity_id: "{{ default_scene }}"
          # Switch is turned on last — may trigger switch_on → restart, which is harmless
          - service: light.turn_on
            target:
              entity_id: "{{ switch_entity }}"

      # -------------------------------------------------------------------------
      # LIGHT TURNED OFF (Hue app, HA, or another automation):
      # Update LED to off state, then turn off the switch.
      # LED is updated before switch to survive a potential restart.
      # -------------------------------------------------------------------------
      - conditions: "{{ trigger.id == 'light_off' }}"
        sequence:
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ z2m_device_name }}/set"
              payload: >
                {
                  "ledColorWhenOff": {{ switch_led_off_color }},
                  "ledIntensityWhenOff": 1
                }
          - service: light.turn_off
            target:
              entity_id: "{{ switch_entity }}"

      # -------------------------------------------------------------------------
      # SWITCH TURNED ON (from HA UI or another automation):
      # Sync the Hue light on. Skipped if light is already on to prevent loops.
      # -------------------------------------------------------------------------
      - conditions: "{{ trigger.id == 'switch_on' and states(light_entity) != 'on' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light_entity }}"

      # -------------------------------------------------------------------------
      # SWITCH TURNED OFF (from HA UI or another automation):
      # Sync the Hue light off. Skipped if light is already off to prevent loops.
      # -------------------------------------------------------------------------
      - conditions: "{{ trigger.id == 'switch_off' and states(light_entity) != 'off' }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: "{{ light_entity }}"

mode: restart
